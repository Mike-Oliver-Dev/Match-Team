<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Ultimate Selector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b162c; color: #fff; }
        .nfl-title { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }
        .card { background: #ffffff; color: #1a1a1a; border-radius: 1rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="max-w-2xl w-full">
        <div id="home-screen" class="text-center animate__animated animate__fadeIn">
            <h1 class="nfl-title text-6xl mb-4">NFL ULTIMATE SELECTOR</h1>
            <p class="text-xl mb-8 opacity-90">10 perguntas precisas para encontrar sua casa entre os 32 times da liga.</p>
            <button onclick="startQuiz()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-xl transition hover:scale-105">
                INICIAR TESTE
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="card p-8">
                <div class="mb-6 font-bold text-gray-500" id="progress-text">Pergunta 1/10</div>
                <h2 id="question-text" class="text-2xl font-bold mb-8"></h2>
                <div id="options-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="card p-10 text-center">
                <h2 class="text-gray-500 uppercase tracking-widest font-bold mb-2">Seu time ideal é:</h2>
                <h1 id="team-name" class="nfl-title text-7xl text-blue-900 mb-4"></h1>
                <p id="team-desc" class="text-lg text-gray-700 mb-8"></p>
                <button onclick="location.reload()" class="text-red-600 font-bold hover:underline">Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Qual clima você prefere?", o: [["Frio e neve", "north"], ["Sol e calor", "south"], ["Clima temperado", "coastal"], ["Estádio fechado (domo)", "dome"]] },
            { q: "Estilo de jogo favorito?", o: [["Defesa agressiva", "defensive"], ["Ataque aéreo", "offensive"], ["Corrida e força", "ground"], ["Equilibrado", "balanced"]] },
            { q: "Sua personalidade no esporte?", o: [["Tradicionalista/Histórico", "trad"], ["Moderno/Inovador", "modern"], ["Azarão", "underdog"], ["Vencedor nato", "winner"]] },
            { q: "Região preferida nos EUA?", o: [["Costa Leste", "east"], ["Costa Oeste", "west"], ["Midwest", "midwest"], ["Sul", "south"]] },
            { q: "Como você lida com frustrações?", o: [["Foco na reconstrução", "patience"], ["Exijo mudanças rápidas", "results"], ["Amor eterno apesar de tudo", "loyalty"], ["Crítico ferrenho", "demanding"]] },
            { q: "Qual a importância da estética/uniforme?", o: [["Clássico/Vintage", "classy"], ["Moderno/ousado", "bold"], ["Minimalista", "clean"], ["Não importa", "neutral"]] },
            { q: "O que te atrai em um ídolo?", o: [["O Quarterback estrela", "qb"], ["O técnico genial", "coach"], ["A unidade defensiva", "defense"], ["O time como unidade", "team"]] },
            { q: "Qual seu nível de otimismo?", o: [["Sempre acho que vamos ganhar", "optimist"], ["Pé no chão/cauteloso", "realist"], ["Cético cronicamente", "cynic"], ["Sonhador", "dreamer"]] },
            { q: "Você prefere um time com:", o: [["Muita história/títulos", "history"], ["Potencial para o futuro", "future"], ["Cultura de elite", "culture"], ["Identidade única", "niche"]] },
            { q: "Como você assiste o jogo?", o: [["Sozinho e concentrado", "focused"], ["Com amigos/bar", "social"], ["Sofrendo em silêncio", "intense"], ["Relaxado", "casual"]] }
        ];

        const teams = [
            { name: "Packers", traits: ["north", "trad", "history", "midwest"] },
            { name: "Chiefs", traits: ["midwest", "winner", "modern", "qb"] },
            { name: "Cowboys", traits: ["south", "history", "demanding", "team"] },
            { name: "49ers", traits: ["west", "trad", "balanced", "history"] },
            { name: "Patriots", traits: ["east", "history", "defensive", "coach"] },
            { name: "Steelers", traits: ["midwest", "trad", "defensive", "loyalty"] },
            { name: "Eagles", traits: ["east", "offensive", "intense", "bold"] },
            { name: "Dolphins", traits: ["south", "modern", "offensive", "bold"] },
            { name: "Raiders", traits: ["west", "trad", "bold", "niche"] },
            { name: "Bills", traits: ["north", "loyalty", "offensive", "patience"] },
            { name: "Ravens", traits: ["east", "defensive", "modern", "team"] },
            { name: "Lions", traits: ["north", "underdog", "patience", "ground"] },
            { name: "Bears", traits: ["midwest", "trad", "defensive", "history"] },
            { name: "Giants", traits: ["east", "trad", "history", "balanced"] },
            { name: "Seahawks", traits: ["west", "modern", "defensive", "bold"] },
            { name: "Saints", traits: ["south", "dome", "offensive", "culture"] },
            { name: "Broncos", traits: ["west", "trad", "defensive", "history"] },
            { name: "Vikings", traits: ["north", "dome", "balanced", "loyalty"] },
            { name: "Bengals", traits: ["midwest", "modern", "offensive", "qb"] },
            { name: "Browns", traits: ["midwest", "underdog", "loyalty", "trad"] },
            { name: "Texans", traits: ["south", "future", "modern", "team"] },
            { name: "Jaguars", traits: ["south", "future", "bold", "niche"] },
            { name: "Titans", traits: ["south", "ground", "balanced", "patience"] },
            { name: "Colts", traits: ["midwest", "dome", "balanced", "qb"] },
            { name: "Jets", traits: ["east", "trad", "demanding", "niche"] },
            { name: "Commanders", traits: ["east", "history", "patience", "team"] },
            { name: "Panthers", traits: ["south", "future", "balanced", "modern"] },
            { name: "Falcons", traits: ["south", "dome", "offensive", "niche"] },
            { name: "Cardinals", traits: ["west", "dome", "modern", "niche"] },
            { name: "Rams", traits: ["west", "dome", "modern", "winner"] },
            { name: "Chargers", traits: ["west", "modern", "offensive", "qb"] },
            { name: "Buccaneers", traits: ["south", "bold", "defensive", "history"] }
        ];

        let currentQ = 0;
        let userTraits = {};

        function startQuiz() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const data = questions[currentQ];
            document.getElementById('progress-text').innerText = `Pergunta ${currentQ + 1}/10`;
            document.getElementById('question-text').innerText = data.q;
            const cont = document.getElementById('options-container');
            cont.innerHTML = '';
            data.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 border rounded-lg text-left hover:bg-gray-100 transition';
                btn.innerText = opt[0];
                btn.onclick = () => {
                    userTraits[opt[1]] = (userTraits[opt[1]] || 0) + 1;
                    currentQ++;
                    currentQ < 10 ? renderQ() : finish();
                };
                cont.appendChild(btn);
            });
        }

        function finish() {
            const bestTeam = teams.map(t => ({
                name: t.name,
                score: t.traits.reduce((acc, trait) => acc + (userTraits[trait] || 0), 0)
            })).sort((a, b) => b.score - a.score)[0];

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('team-name').innerText = bestTeam.name;
            document.getElementById('team-desc').innerText = `Com base nas suas respostas, a cultura e a história do ${bestTeam.name} alinham-se perfeitamente com o seu perfil de torcedor.`;
        }
    </script>
</body>
</html>
