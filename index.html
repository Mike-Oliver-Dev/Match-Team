<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Ultimate Selector - Descubra seu Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b162c; color: #fff; }
        .nfl-title { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }
        .card { background: #ffffff; color: #1a1a1a; border-radius: 1rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="max-w-2xl w-full">
        <div id="home-screen" class="text-center animate__animated animate__fadeIn">
            <h1 class="nfl-title text-6xl mb-4">NFL ULTIMATE SELECTOR</h1>
            <p class="text-xl mb-8 opacity-90">15 perguntas precisas para revelar seu destino na NFL.</p>
            <button onclick="startQuiz()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-xl transition hover:scale-105">
                INICIAR TESTE
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="card p-8">
                <div class="mb-6 font-bold text-gray-500" id="progress-text">Pergunta 1/15</div>
                <h2 id="question-text" class="text-2xl font-bold mb-8"></h2>
                <div id="options-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="card p-10 text-center">
                <h2 class="text-gray-500 uppercase tracking-widest font-bold mb-2">Seu time ideal é:</h2>
                <h1 id="team-name" class="nfl-title text-7xl text-blue-900 mb-6 uppercase"></h1>
                <p id="team-desc" class="text-lg text-gray-700 mb-8"></p>
                <button onclick="location.reload()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 px-8 rounded-full transition">Refazer teste</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Qual clima você prefere?", o: [["Frio e neve", "north"], ["Sol e calor", "south"], ["Clima temperado", "coastal"], ["Estádio fechado (domo)", "dome"]] },
            { q: "Estilo de jogo favorito?", o: [["Defesa agressiva", "defensive"], ["Ataque aéreo", "offensive"], ["Corrida e força", "ground"], ["Equilibrado", "balanced"]] },
            { q: "Sua personalidade?", o: [["Tradicionalista/Histórico", "trad"], ["Moderno/Inovador", "modern"], ["Azarão", "underdog"], ["Vencedor nato", "winner"]] },
            { q: "Região preferida dos EUA?", o: [["Costa Leste", "east"], ["Costa Oeste", "west"], ["Midwest", "midwest"], ["Sul/Texas", "south"]] },
            { q: "Como você lida com frustrações?", o: [["Paciência (reconstrução)", "patience"], ["Exijo resultados", "results"], ["Amor eterno (lealdade)", "loyalty"], ["Crítico ferrenho", "demanding"]] },
            { q: "Estética do uniforme?", o: [["Clássico/Vintage", "classy"], ["Moderno/ousado", "bold"], ["Minimalista/Clean", "clean"], ["Não importa", "neutral"]] },
            { q: "O que te atrai em um ídolo?", o: [["O Quarterback estrela", "qb"], ["O técnico estrategista", "coach"], ["A unidade defensiva", "defense"], ["O time como unidade", "team"]] },
            { q: "Seu nível de otimismo?", o: [["Sempre ganha", "optimist"], ["Pé no chão", "realist"], ["Cético", "cynic"], ["Sonhador", "dreamer"]] },
            { q: "Você prefere um time com:", o: [["Muita história e títulos", "history"], ["Potencial para o futuro", "future"], ["Cultura de elite", "culture"], ["Identidade única", "niche"]] },
            { q: "Como você assiste o jogo?", o: [["Sozinho/focado", "focused"], ["Com amigos/social", "social"], ["Sofrendo em silêncio", "intense"], ["Relaxado", "casual"]] },
            { q: "Importância da localização?", o: [["Cidade grande", "metro"], ["Localidade raiz", "smalltown"], ["Importância cultural", "historic"], ["Tanto faz", "neutral"]] },
            { q: "Tradição ou Inovação?", o: [["Raízes", "trad"], ["Energia jovem", "modern"], ["Estabilidade", "balanced"], ["Inovação", "future"]] },
            { q: "Postura frente aos rivais?", o: [["Detesto eles", "intense"], ["Respeito mas venço", "realist"], ["Não me importo", "casual"], ["Foco no meu time", "focused"]] },
            { q: "Tipo de liderança?", o: [["Dono influente", "demanding"], ["GM genial", "coach"], ["Liderança de campo", "team"], ["Consenso", "balanced"]] },
            { q: "Sua visão de sucesso?", o: [["Super Bowls", "winner"], ["Competitividade", "balanced"], ["Desenvolvimento", "future"], ["Honrar o nome", "history"]] }
        ];

        const teams = [
            { name: "Packers", traits: ["north", "trad", "history", "midwest", "smalltown", "loyalty"] },
            { name: "Chiefs", traits: ["midwest", "winner", "modern", "qb", "offensive", "future"] },
            { name: "Cowboys", traits: ["south", "history", "demanding", "team", "metro", "winner"] },
            { name: "49ers", traits: ["west", "trad", "balanced", "history", "modern", "coach"] },
            { name: "Patriots", traits: ["east", "history", "defensive", "coach", "trad", "realist"] },
            { name: "Steelers", traits: ["midwest", "trad", "defensive", "loyalty", "history", "team"] },
            { name: "Eagles", traits: ["east", "offensive", "intense", "bold", "metro", "demanding"] },
            { name: "Dolphins", traits: ["south", "modern", "offensive", "bold", "metro", "future"] },
            { name: "Raiders", traits: ["west", "trad", "bold", "niche", "underdog", "intense"] },
            { name: "Bills", traits: ["north", "loyalty", "offensive", "patience", "underdog", "intense"] },
            { name: "Ravens", traits: ["east", "defensive", "modern", "team", "coach", "balanced"] },
            { name: "Lions", traits: ["north", "underdog", "patience", "ground", "loyalty", "future"] },
            { name: "Bears", traits: ["midwest", "trad", "defensive", "history", "smalltown", "loyalty"] },
            { name: "Giants", traits: ["east", "trad", "history", "balanced", "metro", "realist"] },
            { name: "Seahawks", traits: ["west", "modern", "defensive", "bold", "intense", "future"] },
            { name: "Saints", traits: ["south", "dome", "offensive", "culture", "history", "social"] },
            { name: "Broncos", traits: ["west", "trad", "defensive", "history", "balanced", "winner"] },
            { name: "Vikings", traits: ["north", "dome", "balanced", "loyalty", "history", "dreamer"] },
            { name: "Bengals", traits: ["midwest", "modern", "offensive", "qb", "underdog", "future"] },
            { name: "Browns", traits: ["midwest", "underdog", "loyalty", "trad", "intense", "history"] },
            { name: "Texans", traits: ["south", "future", "modern", "team", "metro", "offensive"] },
            { name: "Jaguars", traits: ["south", "future", "bold", "niche", "underdog", "modern"] },
            { name: "Titans", traits: ["south", "ground", "balanced", "patience", "trad", "realist"] },
            { name: "Colts", traits: ["midwest", "dome", "balanced", "qb", "coach", "trad"] },
            { name: "Jets", traits: ["east", "trad", "demanding", "niche", "metro", "underdog"] },
            { name: "Commanders", traits: ["east", "history", "patience", "team", "metro", "trad"] },
            { name: "Panthers", traits: ["south", "future", "balanced", "modern", "niche", "realist"] },
            { name: "Falcons", traits: ["south", "dome", "offensive", "niche", "metro", "future"] },
            { name: "Cardinals", traits: ["west", "dome", "modern", "niche", "future", "realist"] },
            { name: "Rams", traits: ["west", "dome", "modern", "winner", "metro", "bold"] },
            { name: "Chargers", traits: ["west", "modern", "offensive", "qb", "metro", "future"] },
            { name: "Buccaneers", traits: ["south", "bold", "defensive", "history", "niche", "winner"] }
        ];

        let currentQ = 0;
        let userTraits = {};

        function startQuiz() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const data = questions[currentQ];
            document.getElementById('progress-text').innerText = `Pergunta ${currentQ + 1}/15`;
            document.getElementById('question-text').innerText = data.q;
            const cont = document.getElementById('options-container');
            cont.innerHTML = '';
            data.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 border border-gray-200 rounded-lg text-left hover:bg-blue-50 transition transform hover:-translate-y-0.5 shadow-sm';
                btn.innerText = opt[0];
                btn.onclick = () => {
                    userTraits[opt[1]] = (userTraits[opt[1]] || 0) + 1;
                    currentQ++;
                    currentQ < 15 ? renderQ() : finish();
                };
                cont.appendChild(btn);
            });
        }

        function finish() {
            const bestTeam = teams.map(t => ({
                name: t.name,
                score: t.traits.reduce((acc, trait) => acc + (userTraits[trait] || 0), 0)
            })).sort((a, b) => b.score - a.score)[0];

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('team-name').innerText = bestTeam.name;
            document.getElementById('team-desc').innerText = `Com base nas suas 15 respostas, a cultura e a identidade do ${bestTeam.name} são as que melhor se alinham ao seu perfil de torcedor.`;
        }
    </script>
</body>
</html>
